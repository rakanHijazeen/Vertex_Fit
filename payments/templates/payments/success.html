{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto py-16 px-4 text-center">
    <div class="bg-slate-800 border border-slate-700 rounded-2xl p-8 shadow-xl">
        <!-- Success Icon -->
        <div class="w-16 h-16 bg-emerald-500/10 border border-emerald-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>

        <h1 class="text-3xl font-bold text-white mb-2">You're All Set!</h1>
        <p class="text-slate-400 mb-6">Your subscription has been activated successfully. Get ready to experience your new AI features.</p>

        <!-- Dynamic Action Buttons -->
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="/" class="bg-emerald-500 hover:bg-emerald-600 text-slate-900 font-bold px-6 py-3 rounded-lg transition">
                Go to Dashboard
            </a>
            <a href="{% url 'payments:pricing' %}" class="border border-slate-600 text-slate-300 hover:bg-slate-700 font-medium px-6 py-3 rounded-lg transition">
                View Subscription
            </a>
        </div>
    </div>
</div>
{% endblock %}
