services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-vertex_fit_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-vertex_fit_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
      daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DB_HOST: db
      REDIS_HOST: redis
      REDIS_URL: redis://redis:6379/0
      PADDLE_CLIENT_TOKEN: ${PADDLE_CLIENT_TOKEN}
      PADDLE_PRO_PRICE_ID: ${PADDLE_PRO_PRICE_ID}
      PADDLE_ANNUAL_PRICE_ID: ${PADDLE_ANNUAL_PRICE_ID}
      PADDLE_VIP_PRICE_ID: ${PADDLE_VIP_PRICE_ID}
      PADDLE_WEBHOOK_SECRET: ${PADDLE_WEBHOOK_SECRET}
    volumes:
      - .:/app
      - ./media:/app/media
      - ./gcp-vertex-sa.json:/app/gcp-vertex-sa.json:ro
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
    restart: unless-stopped
    command: >
      sh -c "python manage.py process_tasks"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DB_HOST: db
      REDIS_HOST: redis
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
      - ./media:/app/media
      - ./gcp-vertex-sa.json:/app/gcp-vertex-sa.json:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data: