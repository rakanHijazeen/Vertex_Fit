{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-900 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-gray-800 p-8 rounded-xl shadow-2xl border border-gray-700 text-center">
        <div
            class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-green-950 border border-green-500">
            <!-- Success Checkmark Icon -->
            <svg class="h-6 w-6 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
            </svg>
        </div>
        <div>
            <h2 class="mt-6 text-3xl font-extrabold text-white">Password Reset Complete</h2>
            <p class="mt-4 text-sm text-gray-400">
                Your password has been changed successfully. You can now log in with your new credentials.
            </p>
        </div>
        <div class="mt-8">
            <a href="{% url 'login_page' %}"
                class="w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none transition duration-150">
                Go to Sign In
            </a>
        </div>
    </div>
</div>
{% endblock %}
