<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
</head>

<body style="font-family: sans-serif; background-color: #f4f4f5; padding: 40px; margin: 0;">
    <div
        style="max-width: 500px; background-color: #ffffff; padding: 30px; border-radius: 8px; margin: 0 auto; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
        <h2 style="color: #0f172a; margin-top: 0;">Welcome to Vertex Fit!</h2>
        <p style="color: #475569; font-size: 16px; line-height: 1.5;">Hi {{ user.username }},</p>
        <p style="color: #475569; font-size: 16px; line-height: 1.5;">Thank you for registering. Please confirm your
            email address by clicking the button below:</p>
        <div style="text-align: center; margin: 30px 0;">
            <a href="{{ verify_url }}"
                style="background-color: #2563eb; color: #ffffff; padding: 12px 24px; border-radius: 6px; text-decoration: none; font-weight: bold; display: inline-block;">Verify
                Email</a>
        </div>
        <p style="color: #94a3b8; font-size: 12px;">This link will expire in 24 hours. If you did not sign up for Vertex
            Fit, you can safely ignore this email.</p>
    </div>
</body>

</html>
