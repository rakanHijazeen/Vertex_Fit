<!DOCTYPE html>
<html>

<body style="font-family: sans-serif; background-color: #f4f4f5; padding: 40px;">
    <div style="max-width: 500px; background-color: #ffffff; padding: 30px; border-radius: 8px; margin: 0 auto;">
        <h2 style="color: #0f172a;">Password Reset Request</h2>
        <p style="color: #475569; font-size: 16px;">We received a request to reset your password for your Vertex Fit
            account.</p>
        <div style="text-align: center; margin: 35px 0;">
            <a href="{{ protocol }}://{{ domain }}{% url 'password_reset_confirm' uidb64=uid token=token %}"
                style="background-color: #ef4444; color: #ffffff; padding: 12px 24px; border-radius: 6px; text-decoration: none; font-weight: bold; display: inline-block;">Reset
                Password</a>
        </div>
        <p style="color: #94a3b8; font-size: 12px;">If you did not request this change, you can safely ignore this
            email.</p>
    </div>
</body>

</html>
