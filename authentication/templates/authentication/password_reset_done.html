{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-white">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertex Fit AI - Link Dispatched</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="flex items-center justify-center min-h-full bg-slate-950 font-sans antialiased text-slate-200 px-4">
    <div
        class="w-full max-w-md bg-slate-900/40 border border-slate-900 p-8 rounded-2xl backdrop-blur-sm shadow-2xl space-y-6 text-center">

        <!-- Vertex Brand Icon -->
        <div class="flex flex-col items-center space-y-3">
            <div
                class="h-10 w-10 rounded-lg bg-emerald-500 flex items-center justify-center font-black text-black shadow-[0_0_20px_rgba(16,185,129,0.4)] text-xl">
                V
            </div>
            <h2
                class="text-2xl font-black tracking-wider bg-gradient-to-r from-white via-slate-200 to-slate-400 bg-clip-text text-transparent">
                VERTEX <span class="text-emerald-400">FIT</span>
            </h2>
        </div>

        <!-- Styled Envelope Icon (Sized and Colored) -->
        <div class="flex justify-center py-2">
            <div
                class="h-16 w-16 bg-emerald-500/10 border border-emerald-500/20 rounded-2xl flex items-center justify-center text-3xl">
                ✉️
            </div>
        </div>

        <!-- Success Message -->
        <div class="space-y-2">
            <h3 class="text-lg font-bold text-white tracking-tight">Check Your Email</h3>
            <p class="text-sm text-slate-400 leading-relaxed">
                We've dispatched a recovery link to your registered email address. Please follow the instructions to
                secure your profile.
            </p>
        </div>

        <!-- Footer / Return Links -->
        <div class="border-t border-slate-800/80 pt-4 mt-2">
            <p class="text-xs text-slate-500">
                Didn't receive it? Check your spam or junk folder.
            </p>
            <div class="pt-4">
                <a href="/auth/login/"
                    class="inline-flex items-center text-xs font-bold text-emerald-400 hover:text-white bg-slate-950 hover:bg-emerald-500 border border-slate-800 hover:border-emerald-500 px-4 py-2 rounded-xl transition-all shadow-sm">
                    ← Back to Sign In
                </a>
            </div>
        </div>

    </div>
</body>

</html>
