{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-900 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-gray-800 p-8 rounded-xl shadow-2xl border border-gray-700 text-center">
        <div
            class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-blue-900/50 border border-blue-500">
            <!-- Envelope Icon -->
            <svg class="h-6 w-6 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 19v-8.93a2 2 0 01.89-1.664l8-4.72a2 2 0 012.22 0l8 4.72A2 2 0 0121 10.07V19M3 19a2 2 0 002 2h14a2 2 0 002-2M3 19l6.75-4.5M21 19l-6.75-4.5M3 10l6.75 4.5M21 10l-6.75 4.5m0 0l-2.25-1.5a2 2 0 00-2.22 0l-2.25 1.5" />
            </svg>
        </div>
        <div>
            <h2 class="mt-6 text-3xl font-extrabold text-white">Check your email</h2>
            <p class="mt-4 text-sm text-gray-400">
                We've sent a recovery link to your registered email address.
            </p>
            <p class="mt-2 text-xs text-gray-500">
                If you don't receive it within a few minutes, check your spam or junk folder.
            </p>
        </div>
        <div class="mt-6">
            <a href="{% url 'login_page' %}"
                class="text-sm font-semibold text-blue-400 hover:text-blue-300 transition duration-150">
                &larr; Back to Log In
            </a>
        </div>
    </div>
</div>
{% endblock %}
