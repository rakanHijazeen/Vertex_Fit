{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-900 text-white">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vertex Fit AI - Live Tracking</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <style>
        /* overlay canvas positioned above the video for drawing landmarks/tracers */
        .relative video {
            display: block;
        }

        #output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            /* allow clicks to pass through */
        }
    </style>
</head>

<body class="flex flex-col h-full overflow-hidden font-sans select-none">

    <div id="django-context" data-csrf="{{ csrf_token }}" class="hidden"></div>

    <div class="max-w-5xl mx-auto p-4">
        <header class="flex items-center justify-between gap-4 mb-4">
            <h2 class="text-2xl font-bold text-emerald-400">Live AI Coach</h2>

            <div class="flex items-center gap-3">
                <label for="exerciseSelector" class="text-sm text-slate-300 hidden sm:inline">Exercise</label>
                <select id="exerciseSelector"
                    class="bg-slate-800 text-white rounded-md px-3 py-2 border border-slate-700">
                    <!-- value: slug, data-anchor-joint: MediaPipe node index, data-track-horizontally: boolean, data-fallback-anchor: optional -->
                    <option value="squat" data-anchor-joint="24" data-track-horizontally="false">Squat</option>
                    <option value="deadlift" data-anchor-joint="24" data-track-horizontally="false">Deadlift</option>
                    <option value="rdl" data-anchor-joint="24" data-track-horizontally="false">Romanian Deadlift (RDL)
                    </option>
                    <option value="leg_press" data-anchor-joint="24" data-track-horizontally="false">Leg Press</option>
                    <option value="hip_thrust" data-anchor-joint="24" data-track-horizontally="false">Hip Thrust
                    </option>
                    <option value="lunge" data-anchor-joint="24" data-track-horizontally="false">Lunge</option>

                    <option value="bench_press" data-anchor-joint="16" data-track-horizontally="false">Bench Press
                    </option>
                    <option value="bicep_curl" data-anchor-joint="16" data-track-horizontally="false">Bicep Curl
                    </option>
                    <option value="overhead_press" data-anchor-joint="16" data-track-horizontally="false">Overhead Press
                    </option>
                    <option value="lateral_raise" data-anchor-joint="16" data-track-horizontally="false">Lateral Raise
                    </option>

                    <option value="lat_pulldown" data-anchor-joint="16" data-track-horizontally="false"
                        data-fallback-anchor="12">Lat Pulldown</option>
                    <option value="cable_row" data-anchor-joint="16" data-track-horizontally="true"
                        data-fallback-anchor="12">Cable Row</option>

                    <option value="pull_up" data-anchor-joint="12" data-track-horizontally="false">Pull-Up</option>
                    <option value="dip" data-anchor-joint="12" data-track-horizontally="false">Dip</option>
                    <option value="push_up" data-anchor-joint="16" data-track-horizontally="false">Push-Up</option>
                </select>
            </div>
        </header>

        <main class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <section class="md:col-span-2 bg-slate-900 rounded-lg p-2 flex flex-col items-center">
                <div class="relative w-full bg-black rounded-md overflow-hidden">
                    <video id="webcam" autoplay playsinline muted class="w-full h-72 object-cover bg-black"></video>
                    <canvas id="output_canvas"></canvas>

                    <div id="recordingStatus"
                        class="absolute top-3 left-3 hidden inline-flex items-center gap-2 px-3 py-1 rounded-full bg-red-600/20 text-red-300 text-sm font-medium">
                        <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                        Live Tracking Active
                    </div>
                </div>

                <div class="w-full mt-3 flex items-center justify-between gap-3">
                    <div class="flex items-center gap-2">
                        <button id="startCamBtn"
                            class="bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-semibold px-4 py-2 rounded-md shadow">Start
                            Camera & Cues</button>
                        <button id="readySetBtn"
                            class="hidden bg-blue-500 hover:bg-blue-400 text-white font-semibold px-4 py-2 rounded-md shadow">Start
                            Set</button>
                        <button id="stopSendBtn"
                            class="hidden bg-red-500 hover:bg-red-400 text-white font-semibold px-4 py-2 rounded-md shadow">Stop</button>
                    </div>

                    <div class="text-right">
                        <p class="text-xs text-slate-400">Mode</p>
                        <p id="coachMode" class="text-lg font-bold text-white">Idle</p>
                    </div>
                </div>
            </section>

            <aside class="bg-slate-900 rounded-lg p-3 space-y-3">
                <div>
                    <p class="text-xs text-slate-400 uppercase font-semibold">Counted Reps</p>
                    <p id="repDisplay" class="text-3xl font-extrabold text-white">0</p>
                </div>

                <div>
                    <p class="text-xs text-slate-400 uppercase font-semibold">Joint Angle</p>
                    <p id="angleDisplay" class="text-2xl font-bold text-emerald-400">0°</p>
                </div>

                <div>
                    <p class="text-xs text-slate-400 uppercase font-semibold">Coach State</p>
                    <p id="guideText" class="text-sm text-slate-200">Waiting for session init</p>
                </div>
                <div>
                    <p class="text-xs text-slate-400 uppercase font-semibold">Active Joint</p>
                    <p id="activeJointDisplay" class="text-sm text-emerald-300">Joint: -</p>
                </div>
            </aside>
        </main>
    </div>

    <script src="{% static 'workouts/js/workout_tracker.js' %}"></script>
</body>

</html>
